<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form">
    <h1> Реализовать форму регистрации на сайте: </h1> 

<form method="post">
    <label for="fname">Имя:</label><br>
    <input type="text" id="fname" name="fname"><br>
    
    <label for="lname">Фамилия:</label><br>
    <input type="text" id="lname" name="lname"><br>

    <label for="thname">Отчество:</label><br>
    <input type="text" id="thname" name="thname"><br>

    <label for="data">Дата рождения:</label><br>
    <input type="date" id="data" name="data"><br>
    
    <label for="mail">E-mail:</label><br>
    <input type="email" id="mail" name="mail"><br>

    <label for="login">Логин:</label><br>
    <input type="text" id="login" name="login"><br>

    <label for="password">Пароль:</label><br>
    <input type="password" id="password" name="password"><br><br>

    <button class="botton" type="button">Отправить:</button>
</form>

</div>
    


</body>
</html>
